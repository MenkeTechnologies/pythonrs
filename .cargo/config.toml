# stdlib-ffi is on by default (see [features] in Cargo.toml). pyo3 0.24 has no
# native CPython 3.14 support, so its build-time ABI version check must be told to
# forward-compat against 3.14 via the stable ABI. Baking the flag here means a bare
# `cargo build` works without the caller exporting it. Drop when pyo3 ships 3.14.
[env]
PYO3_USE_ABI3_FORWARD_COMPATIBILITY = "1"
