name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    # Per-target failures are tolerated on the flaky variants so the
    # downstream publish + tap job ships from whichever targets did
    # build. `needs: build` is satisfied either way.
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- macOS native ---
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          # --- Linux glibc ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            # Cross-compile from ubuntu-latest x86_64 via cross-rs Docker —
            # more reliable than native ubuntu-24.04-arm runners which
            # occasionally evict mid-build. No allow_failure: this target
            # must succeed so the formula's on_linux/on_arm block emits.
            use_cross: true
          # --- Linux musl static (portable across glibc/musl distros) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            allow_failure: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            allow_failure: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: |
          # Prefer the prebuilt binary release over `cargo install`
          # to save ~5 min of compile time per cross-build runner.
          CROSS_VER="v0.2.5"
          curl -sSLf -o /tmp/cross.tar.gz \
            "https://github.com/cross-rs/cross/releases/download/${CROSS_VER}/cross-x86_64-unknown-linux-gnu.tar.gz"
          tar -C /tmp -xzf /tmp/cross.tar.gz
          sudo install -m 755 /tmp/cross /usr/local/bin/cross

      - uses: Swatinem/rust-cache@v2
        if: '!matrix.use_cross'

      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --locked --target ${{ matrix.target }} --bin python

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }} --bin python

      - name: Package
        shell: bash
        run: |
          # Tarball keeps the `pythonrs-` name (the release/repo is pythonrs);
          # the binary inside it is `python`.
          cd target/${{ matrix.target }}/release
          strip python 2>/dev/null || true
          tar czf ../../../pythonrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz python
          cd ../../..

      - uses: actions/upload-artifact@v6
        with:
          name: pythonrs-${{ matrix.target }}
          path: pythonrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  # Self-contained bundles (FFI_STDLIB.md §6): build with --features stdlib-ffi and
  # ship the pythonrs binary next to the CPython runtime it imports — the pure
  # stdlib, the lib-dynload C accelerators, and libpython itself — laid out so
  # `ffi::resolve_home()` finds `<exe>/../lib/python3.14` with zero env vars. These
  # run WITHOUT a system python@3.14 installed. Only native, same-arch runners are
  # used: bundling a foreign-arch libpython from a cross build is not possible.
  bundle:
    name: Bundle ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    continue-on-error: ${{ matrix.allow_failure || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 — the primary target, verified layout.
          - os: macos-latest
            target: aarch64-apple-darwin
          # Linux x86_64 glibc — native on ubuntu-latest. Tolerated-failure so a
          # CPython/toolchain hiccup here never blocks the macOS bundle.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            allow_failure: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # A real CPython 3.14 (shared libpython + stdlib) must be present for pyo3 to
      # link against and for the bundler to copy from.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Locate CPython prefix
        id: py
        shell: bash
        run: echo "prefix=$(python3 -c 'import sys;print(sys.prefix)')" >> "$GITHUB_OUTPUT"

      - name: Install patchelf (Linux rpath rewrite)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - uses: Swatinem/rust-cache@v2

      - name: Build (stdlib-ffi)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: cargo build --release --locked --features stdlib-ffi --bin python --target ${{ matrix.target }}

      - name: Bundle self-contained tree
        shell: bash
        run: |
          scripts/bundle-stdlib.sh \
            --prefix "${{ steps.py.outputs.prefix }}" \
            --bin "target/${{ matrix.target }}/release/python" \
            --triple "${{ matrix.target }}"

      - name: Smoke test the bundle (system python hidden)
        shell: bash
        run: |
          cd "dist/${{ matrix.target }}"
          env -u PYTHONHOME -u PYTHONPATH -u PYTHONRS_STDLIB \
            ./bin/python -c 'import re,hashlib,_hashlib; \
              assert re.findall(r"\d+","a1")==["1"]; \
              assert hashlib.sha256(b"x").hexdigest().startswith("2d711642"); \
              print("bundle OK:", re.__file__)'

      - name: Package
        shell: bash
        run: |
          # Tar the self-contained tree with bin/ + lib/ at the archive root
          # (`-C dist/<triple>`), preserving the `<exe>/../lib` layout the binary
          # depends on. Extracting anywhere reproduces a runnable prefix.
          tar czf "pythonrs-${{ github.ref_name }}-${{ matrix.target }}-bundled.tar.gz" \
            -C "dist/${{ matrix.target }}" bin lib

      - uses: actions/upload-artifact@v6
        with:
          name: pythonrs-${{ matrix.target }}-bundled
          path: pythonrs-${{ github.ref_name }}-${{ matrix.target }}-bundled.tar.gz

  publish:
    name: Publish GitHub Release
    needs: [build, bundle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            # e.g. pythonrs-vX.Y.Z-aarch64-apple-darwin.tar.gz → aarch64_apple_darwin
            key=$(echo "$base" | sed 's/pythonrs-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v6
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          # Self-contained bundles (bin/python + the CPython runtime). Bottling the
          # bundle over `depends_on "python@3.14"` because the tarball carries its
          # own libpython + stdlib — the formula never relies on the user's brew
          # python prefix matching the CI build prefix.
          SHA_ARM_MACOS: ${{ steps.sha.outputs.aarch64_apple_darwin_bundled }}
          SHA_X86_LINUX: ${{ steps.sha.outputs.x86_64_unknown_linux_gnu_bundled }}
        run: |
          set -eu
          V="${VERSION#v}"
          BASE="https://github.com/MenkeTechnologies/pythonrs/releases/download/v${V}"
          # macOS arm is the primary target — a missing bundle there is a
          # release failure, not a platform to silently drop.
          if [ -z "${SHA_ARM_MACOS}" ]; then
            echo "::error::aarch64-apple-darwin bundle missing — refusing to ship a broken formula" >&2
            exit 1
          fi
          # Emit an on_arm / on_intel url+sha block for a bundled tarball, already
          # wrapped in its on_macos / on_linux guard (empty string if no SHA).
          emit() { local guard="$1" arch="$2" sha="$3"; [ -n "$sha" ] || return 0; printf '    %s do\n      url "%s/pythonrs-v%s-%s-bundled.tar.gz"\n      sha256 "%s"\n    end\n' "$guard" "$BASE" "$V" "$arch" "$sha"; }
          mac_inner=$( emit on_arm aarch64-apple-darwin "$SHA_ARM_MACOS" )
          linux_inner=$( emit on_intel x86_64-unknown-linux-gnu "$SHA_X86_LINUX" )
          {
            printf 'class Pythonrs < Formula\n'
            printf '  desc "Compiled Python runtime on the fusevm bytecode VM + Cranelift JIT"\n'
            printf '  homepage "https://github.com/MenkeTechnologies/pythonrs"\n'
            printf '  license "MIT"\n'
            printf '  version "%s"\n\n' "$V"
            [ -n "$mac_inner" ]   && printf '  on_macos do\n%s\n  end\n\n' "$mac_inner"
            [ -n "$linux_inner" ] && printf '  on_linux do\n%s\n  end\n\n' "$linux_inner"
            printf '  def install\n'
            # Tarball root is the self-contained prefix: bin/python + lib/python3.14
            # + lib/libpython. Install the whole tree into libexec (keeping bin/../lib
            # intact so the binary's @executable_path/../lib / $ORIGIN/../lib rpath
            # still resolves the bundled runtime), then symlink bin/python onto PATH.
            printf '    libexec.install "bin", "lib"\n'
            printf '    bin.install_symlink libexec/"bin/python"\n'
            printf '  end\n\n'
            # Mirror the self-contained tree into ~/.pythonrs (co-located with the
            # scripts.rkyv bytecode cache), matching the source install.sh layout.
            # The binary loads libpython via @executable_path/../lib, so bin/ and
            # lib/ must stay siblings; ~/.pythonrs/bin/python then runs against
            # ~/.pythonrs/lib with no dependency on the Cellar. scripts.rkyv (if
            # present) is left untouched — only bin/ and lib/ are refreshed.
            printf '  def post_install\n'
            printf '    home = File.expand_path("~/.pythonrs")\n'
            printf '    mkdir_p home\n'
            printf '    ["bin", "lib"].each do |d|\n'
            printf '      rm_rf "#{home}/#{d}"\n'
            printf '      cp_r "#{libexec}/#{d}", home\n'
            printf '    end\n'
            printf '  end\n\n'
            printf '  test do\n'
            # VM path, then the real CPython stdlib over the FFI bridge. The stdlib
            # case goes through a temp file to sidestep nested-quote escaping.
            printf '    assert_equal "42", shell_output("#{bin}/python -c '\''print(6*7)'\''").strip\n'
            printf '    (testpath/"t.py").write("import hashlib\\nprint(hashlib.sha256(b'\''x'\'').hexdigest()[:8])\\n")\n'
            printf '    assert_equal "2d711642", shell_output("#{bin}/python #{testpath}/t.py").strip\n'
            printf '  end\n'
            printf 'end\n'
          } > tap/Formula/pythonrs.rb

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pythonrs.rb
          if git diff --cached --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "pythonrs: bump to ${{ github.ref_name }}"
          git push
