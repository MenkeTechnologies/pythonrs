name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    # `stdlib-ffi` is on by default (Cargo.toml [features]), so the default
    # build pulls pyo3 and links libpython — it needs a CPython >= 3.13 and the
    # abi3 forward-compat flag, same as the stdlib-ffi job below.
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable && rustup component add rustfmt clippy
      - name: Install CPython
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Doc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  # Explicit `--features stdlib-ffi` job for the CPython stdlib FFI bridge. It is
  # on by default now, so build-test above already exercises it; this job pins
  # the feature explicitly (and its CPython >= 3.13 + abi3 forward-compat env) so
  # the FFI path stays covered even if the default feature set changes.
  stdlib-ffi:
    runs-on: ubuntu-latest
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable && rustup component add clippy
      - name: Install CPython
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Clippy (stdlib-ffi)
        run: cargo clippy --all-targets --features stdlib-ffi -- -D warnings
      - name: Build (stdlib-ffi)
        run: cargo build --verbose --features stdlib-ffi
      - name: Test (stdlib-ffi)
        run: cargo test --verbose --features stdlib-ffi
